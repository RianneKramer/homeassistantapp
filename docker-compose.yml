services:

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: SmartHome

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: 
      context: ./backend/dashboard-api

    container_name: api

    depends_on:
      - postgres

    ports:
      - "5001:8080"

    environment:
      ASPNETCORE_ENVIROMENT: Production
      ConnectionStrings_DbConnection: Host:postgres;Server=127.0.0.1;Port=5432;Database=SmartHome;User Id=postgres;Password=postgres;

  angular:
    build: 
      context: ./frontend/dashboard-client

    container_name: angular

    depends_on:
      - api

    ports:
      - "4200:80"

volumes:
  postgres_data: