services:

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: dashboard-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=dashboard;Username=dashboard;Password=postgres
    ports:
      - "5000:8080"

  frontend:
    build: ./frontend
    container_name: dashboard-ui
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  postgres_data: