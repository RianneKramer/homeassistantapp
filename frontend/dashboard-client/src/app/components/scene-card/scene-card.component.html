<div class="widget">
  <h3 class="widget-title">
    {{scene.name}}
  </h3>

  <div>
    {{scene.enabled ? 'Enabled' : 'Disabled'}}
  </div>

  <div class="widget-actions">
    <button (click)="toggle()">
      Toggle
    </button>
    <button (click)="execute()">
      Execute
    </button>
  </div>
  <div class="widget-actions">
    <button (click)="execute()">
      Edit
    </button>
    <button (click)="execute()">
      Delete
    </button>
  </div>
</div>
